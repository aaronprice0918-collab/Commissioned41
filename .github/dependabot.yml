# Dependabot: automated dependency vulnerability scanning.
# Opens PRs for security updates weekly. Keeps the supply chain clean.
version: 2
updates:
  # Root package.json + workspaces
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Group minor/patch updates to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major bumps are breaking migrations (e.g. Tailwind 3→4, TypeScript 5→7,
      # ESLint 9→10) — do them deliberately as their own reviewed change, never
      # via an unattended bot PR that would fail the build.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # stripe is intentionally pinned: dealer-os's client apiVersion
      # (lib/stripe.ts) must match the SDK's types, and a drift already broke
      # production once. Bump stripe BY HAND together with the apiVersion string.
      - dependency-name: "stripe"
