name: CI

# The safety net for the monorepo: build + test every app on every PR (and on
# main), so broken code can't reach production. Make this a REQUIRED status check
# in branch protection so a red run blocks the merge — that turns "we find out
# when the Vercel deploy fails" into "the PR never merges."
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One run per PR/branch — cancel superseded runs to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test all apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Reproducible install from the committed lockfile. Fails loudly if
      # package.json and package-lock.json ever drift — the class of bug that
      # broke production once already.
      - name: Install (npm ci)
        run: npm ci

      # next build type-checks as it compiles, so this catches type errors,
      # missing imports, and truncated/broken files across dealer-os, eila,
      # finance, and site.
      - name: Build all apps
        run: npx turbo build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "ci-placeholder"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-placeholder"
          NEXT_PUBLIC_OWNER_EMAIL: "owner@example.com"

      - name: Test all apps
        run: npx turbo test
