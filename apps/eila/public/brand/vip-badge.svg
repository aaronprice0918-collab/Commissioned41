<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="vipTitle vipDesc">
  <title id="vipTitle">Platinum VIP</title>
  <desc id="vipDesc">A navy rounded square badge with blue and teal VIP lettering — the EILA Platinum VIP membership mark.</desc>
  <defs>
    <linearGradient id="vipRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#139AF5"/>
      <stop offset="0.5" stop-color="#0A326B"/>
      <stop offset="1" stop-color="#071B39"/>
    </linearGradient>
    <linearGradient id="vipPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071B39"/>
      <stop offset="0.35" stop-color="#0A326B"/>
      <stop offset="0.62" stop-color="#139AF5"/>
      <stop offset="1" stop-color="#31EBC7"/>
    </linearGradient>
    <linearGradient id="vipLetter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9FBFF"/>
      <stop offset="0.42" stop-color="#31EBC7"/>
      <stop offset="1" stop-color="#139AF5"/>
    </linearGradient>
    <linearGradient id="vipSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.25" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.62" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="vipClip">
      <rect x="46" y="46" width="420" height="420" rx="94"/>
    </clipPath>
  </defs>

  <!-- navy motion rim -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#vipRim)"/>
  <!-- blue-teal plate -->
  <rect x="46" y="46" width="420" height="420" rx="94" fill="url(#vipPlate)"/>
  <!-- diagonal light sweep across the metal -->
  <g clip-path="url(#vipClip)">
    <rect x="-80" y="-80" width="672" height="672" fill="url(#vipSheen)" transform="rotate(8 256 256)"/>
  </g>

  <!-- EILA — the family name -->
  <text x="250" y="174" text-anchor="middle"
    font-family="Inter, Avenir Next, Avenir, Arial, sans-serif"
    font-size="44" font-weight="900" letter-spacing="13" fill="#E9FBFF">EILA</text>

  <!-- VIP -->
  <text x="253" y="330" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, Avenir Next, Avenir, Arial, sans-serif"
    font-size="168" font-weight="900" letter-spacing="6" fill="url(#vipLetter)">VIP</text>

  <!-- hairline underline -->
  <rect x="150" y="396" width="212" height="4" rx="2" fill="#31EBC7"/>
</svg>
