<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aaron Price — Commissioned 41</title>
<meta name="description" content="Aaron Price — CEO & President, Commissioned 41" />
<meta property="og:title" content="Aaron Price — CEO & President, Commissioned 41" />
<meta property="og:image" content="https://commissioned41.com/og-c41.png" />
<link rel="icon" href="/favicon.ico?v=5" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Saira:wght@200;300;400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    background: #050506;
    color: #e9edf1;
    font-family: 'Saira', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 28px 18px;
  }
  .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(900px 560px at 50% 22%, rgba(120,140,170,0.10), transparent 60%); }
  .vignette { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    box-shadow: inset 0 0 220px 50px rgba(0,0,0,0.85); }

  .card {
    position: relative; z-index: 1; width: 100%; max-width: 420px;
    background: linear-gradient(180deg, #0c0d10, #08090b);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px; padding: 40px 30px 30px; text-align: center;
    box-shadow: 0 40px 120px rgba(0,0,0,0.7);
  }
  .brandlogo { display: block; width: 190px; height: auto; margin: 0 auto 24px; border-radius: 12px; }

  .name {
    font-family: 'Chakra Petch', sans-serif; font-weight: 700;
    font-size: 30px; letter-spacing: 0.04em; color: #fff; line-height: 1.1;
  }
  .title {
    margin-top: 10px; font-size: 13px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase; color: #9aa0a9;
  }
  .company { margin-top: 4px; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #5f656d; }

  .rule { width: 56px; height: 1px; margin: 24px auto;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); }

  .contacts { display: flex; flex-direction: column; gap: 10px; }
  .row {
    display: flex; align-items: center; gap: 14px; text-decoration: none;
    color: #d6dadf; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07); border-radius: 12px;
    padding: 13px 16px; transition: background .2s, border-color .2s, transform .1s;
  }
  .row:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); }
  .row:active { transform: scale(0.99); }
  .row .ic {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px;
    display: grid; place-items: center; font-size: 16px;
    background: linear-gradient(180deg,#eef1f4,#b8bfc7); color: #0a0b0d;
  }
  .row .lbl { text-align: left; line-height: 1.3; }
  .row .lbl b { display: block; font-weight: 500; font-size: 14px; color: #eef1f4; letter-spacing: .01em; }
  .row .lbl span { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #6c727a; }

  .save {
    margin-top: 16px; width: 100%; cursor: pointer; border: none;
    font-family: 'Chakra Petch', sans-serif; font-weight: 600;
    font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #0a0b0d; background: linear-gradient(180deg,#f3f5f7,#c2c9d0);
    padding: 15px; border-radius: 12px; transition: filter .2s, transform .1s;
  }
  .save:hover { filter: brightness(1.06); }
  .save:active { transform: translateY(1px); }

  .qr { margin-top: 22px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .qr img { width: 104px; height: 104px; border-radius: 10px; background: #fff; padding: 7px; }
  .qr span { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #565c64; }

  .foot { margin-top: 22px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #3f444b; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <main class="card">
    <img class="brandlogo" src="/brand/commissioned41-logo.jpg" alt="Commissioned 41" />

    <h1 class="name">Aaron Price</h1>
    <div class="title">CEO &amp; President</div>
    <div class="company">Commissioned 41, LLC</div>

    <div class="rule"></div>

    <div class="contacts">
      <a class="row" href="tel:+16788522165">
        <span class="ic">&#9742;</span>
        <span class="lbl"><b>678-852-2165</b><span>Call</span></span>
      </a>
      <a class="row" href="mailto:aaronprice0918@gmail.com">
        <span class="ic">&#9993;</span>
        <span class="lbl"><b>aaronprice0918@gmail.com</b><span>Email</span></span>
      </a>
      <a class="row" href="https://commissioned41.com" target="_blank" rel="noopener">
        <span class="ic">&#9728;</span>
        <span class="lbl"><b>commissioned41.com</b><span>Website</span></span>
      </a>
    </div>

    <button class="save" id="save">Save to Contacts</button>

    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=0&data=https%3A%2F%2Fcommissioned41.com%2Fceo.html" alt="Scan to open card" />
      <span>Scan to share</span>
    </div>

    <div class="foot">&copy; Commissioned 41, LLC</div>
  </main>

  <script>
    document.getElementById('save').addEventListener('click', function () {
      var vcf = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:Price;Aaron;;;',
        'FN:Aaron Price',
        'ORG:Commissioned 41, LLC',
        'TITLE:CEO & President',
        'TEL;TYPE=CELL:+16788522165',
        'EMAIL;TYPE=WORK:aaronprice0918@gmail.com',
        'URL:https://commissioned41.com',
        'END:VCARD'
      ].join('\r\n');
      var blob = new Blob([vcf], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'Aaron-Price-Commissioned41.vcf';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
